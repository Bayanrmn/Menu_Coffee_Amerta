<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Coffee Amerta</title>
  <style>
    body {
      margin: 0;
      background: #123285; /* background lembut biar estetik */
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: sans-serif;
    }

    .container {
      max-width: 800px;   /* mengecilkan tampilan */
      padding: 80px 80px; /* jarak atas bawah & samping */
      width: 100%;
    }

    .menu-img {
      width: 100%;
      height: auto;
      border-radius: 16px; /* biar modern */
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: block;
    }

    /* versi mobile biar tetap enak dilihat */
    @media (max-width: 600px) {
      .container {
        padding: 20px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="AMERTA Menu_page-0001.jpg" class="menu-img" alt="Menu Coffee Amerta">
  </div>
</body>
</html>
